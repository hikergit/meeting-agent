<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Copilot</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d2e; --border: #2a2d3e;
    --text: #e2e8f0; --muted: #64748b;
    --low: #22c55e; --medium: #f59e0b; --high: #ef4444; --accent: #6366f1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 600; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .dot.on { background: var(--low); }
  .main { display: flex; flex: 1; overflow: hidden; }
  .col { flex: 1; overflow-y: auto; padding: 14px; }
  .col + .col { border-left: 1px solid var(--border); }
  .col-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 12px; }

  /* Decision cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--muted); border-radius: 8px; padding: 12px; margin-bottom: 10px; animation: fadeIn .3s ease; }
  .card.low  { border-left-color: var(--low); }
  .card.medium { border-left-color: var(--medium); }
  .card.high { border-left-color: var(--high); }
  .card-title { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
  .card-body { font-size: 12px; color: #94a3b8; line-height: 1.55; }
  .evidence { margin-top: 8px; }
  .ev-item { font-size: 11px; color: var(--accent); background: rgba(99,102,241,.1); border-radius: 4px; padding: 3px 8px; margin-top: 3px; }
  .card-meta { font-size: 10px; color: var(--muted); margin-top: 7px; }

  /* State panel */
  .section { margin-bottom: 18px; }
  .section h3 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 7px; }
  .pill { display: inline-block; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2px 10px; font-size: 11px; margin: 2px; }
  .pill.online { border-color: var(--low); }
  .screen-desc { font-size: 11px; color: #94a3b8; font-style: italic; background: var(--surface); border-radius: 5px; padding: 7px 10px; }
  .fact { font-size: 11px; color: #94a3b8; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .fact:last-child { border-bottom: none; }
  .question { font-size: 11px; color: #94a3b8; padding: 3px 0; }
  .empty { color: var(--muted); font-size: 12px; font-style: italic; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<header>
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5">
    <path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l3 3"/><circle cx="19" cy="5" r="3" fill="#6366f1" stroke="none"/>
  </svg>
  <h1>Meeting Copilot</h1>
  <div class="status"><div class="dot" id="dot"></div><span id="status-text">connecting…</span></div>
</header>
<div class="main">
  <!-- Left: insights -->
  <div class="col">
    <div class="col-title">Insights</div>
    <div id="decisions"><p class="empty">Listening…</p></div>
  </div>
  <!-- Right: meeting state -->
  <div class="col">
    <div class="col-title">Meeting State</div>
    <div class="section">
      <h3>Participants</h3>
      <div id="participants"><span class="empty">Waiting…</span></div>
    </div>
    <div class="section">
      <h3>Screen</h3>
      <div id="screen" class="screen-desc">No screen captured yet.</div>
    </div>
    <div class="section">
      <h3>Open Questions</h3>
      <div id="questions"><span class="empty">None yet.</span></div>
    </div>
    <div class="section">
      <h3>Facts Asserted</h3>
      <div id="facts"><span class="empty">None yet.</span></div>
    </div>
  </div>
</div>

<script>
const dot = document.getElementById('dot');
const statusText = document.getElementById('status-text');
const decisionsEl = document.getElementById('decisions');
const participantsEl = document.getElementById('participants');
const screenEl = document.getElementById('screen');
const questionsEl = document.getElementById('questions');
const factsEl = document.getElementById('facts');

let ws, firstDecision = true;

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => {
    dot.classList.add('on');
    statusText.textContent = 'live';
  };
  ws.onclose = () => {
    dot.classList.remove('on');
    statusText.textContent = 'reconnecting…';
    setTimeout(connect, 2000);
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'decision') renderDecision(msg.data);
    if (msg.type === 'state')    renderState(msg.data);
  };
}

function renderDecision(d) {
  if (firstDecision) { decisionsEl.innerHTML = ''; firstDecision = false; }
  const urgency = d.urgency || 'low';
  const ev = (d.payload.evidence || []).map(e =>
    `<div class="ev-item">📎 ${e.source}: "${e.ref}"</div>`
  ).join('');
  const card = document.createElement('div');
  card.className = `card ${urgency}`;
  card.innerHTML = `
    <div class="card-title">${d.payload.title}</div>
    <div class="card-body">${d.payload.body}</div>
    ${ev ? `<div class="evidence">${ev}</div>` : ''}
    <div class="card-meta">${urgency} · ${Math.round(d.confidence * 100)}% · ${new Date(d.timestamp).toLocaleTimeString()}</div>
  `;
  decisionsEl.prepend(card);
}

function renderState(s) {
  if (s.participants.length)
    participantsEl.innerHTML = s.participants.map(p =>
      `<span class="pill ${p.present ? 'online' : ''}">${p.name}</span>`
    ).join('');

  if (s.current_screen) screenEl.textContent = s.current_screen;

  if (s.open_questions.length)
    questionsEl.innerHTML = s.open_questions.slice(-6).map(q =>
      `<div class="question">? ${q}</div>`
    ).join('');

  if (s.facts_asserted.length)
    factsEl.innerHTML = s.facts_asserted.slice(-8).map(f =>
      `<div class="fact"><strong>${f.by}:</strong> ${f.claim}</div>`
    ).join('');
}

connect();
</script>
</body>
</html>
