<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Copilot</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d2e; --surface2: #21263a; --border: #2a2d3e;
    --text: #e2e8f0; --muted: #64748b;
    --heard: #38bdf8; --agent: #a78bfa; --you: #34d399;
    --low: #22c55e; --medium: #f59e0b; --high: #ef4444; --accent: #6366f1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 11px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 600; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .dot.on { background: var(--low); }

  /* ===== TOP: main conversation panel ===== */
  .conversation { flex: 1 1 60%; display: flex; flex-direction: column; overflow: hidden; border-bottom: 2px solid var(--border); }
  .panel-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); padding: 10px 20px 4px; }
  #thread { flex: 1; overflow-y: auto; padding: 8px 20px 16px; display: flex; flex-direction: column; gap: 10px; }

  .turn { display: flex; gap: 10px; animation: fadeIn .25s ease; max-width: 90%; }
  .turn .who { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
  .turn .bubble { padding: 9px 13px; border-radius: 10px; font-size: 13.5px; line-height: 1.5; }
  .turn .role { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 3px; opacity: .8; }

  .turn.heard .bubble { background: var(--surface); border: 1px solid var(--border); }
  .turn.heard .role { color: var(--heard); }
  .turn.agent .bubble { background: rgba(167,139,250,.12); border: 1px solid rgba(167,139,250,.3); }
  .turn.agent .role { color: var(--agent); }
  .turn.agent.high .bubble { background: rgba(239,68,68,.13); border-color: rgba(239,68,68,.4); }
  .turn.you { align-self: flex-end; flex-direction: row-reverse; }
  .turn.you .bubble { background: rgba(52,211,153,.13); border: 1px solid rgba(52,211,153,.35); }
  .turn.you .role { color: var(--you); text-align: right; }

  /* agent turn that needs the user's input */
  .turn.needs-input .bubble { border-color: var(--medium); box-shadow: 0 0 0 1px var(--medium), 0 0 14px rgba(245,158,11,.35); animation: pulse 1.6s ease-in-out infinite; }
  .needs-badge { display: inline-block; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #0f1117; background: var(--medium); border-radius: 4px; padding: 1px 6px; margin-left: 8px; vertical-align: middle; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 1px var(--medium), 0 0 8px rgba(245,158,11,.25);} 50% { box-shadow: 0 0 0 1px var(--medium), 0 0 18px rgba(245,158,11,.55);} }
  /* composer waiting state */
  .composer.waiting input { border-color: var(--medium); box-shadow: 0 0 12px rgba(245,158,11,.4); }
  .composer.waiting::before { content: "✋ Agent is waiting for your reply"; position: absolute; top: -22px; left: 20px; font-size: 11px; color: var(--medium); font-weight: 600; }
  .composer { position: relative; }
  /* header attention */
  .status.attention { color: var(--medium); font-weight: 700; }
  .dot.attention { background: var(--medium); animation: pulse2 1s infinite; }
  @keyframes pulse2 { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  /* input row */
  .composer { display: flex; gap: 8px; padding: 10px 20px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .composer input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; outline: none; }
  .composer input:focus { border-color: var(--accent); }
  .composer button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 0 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .composer button:hover { background: #4f46e5; }

  /* ===== BOTTOM: detailed view ===== */
  .detail { flex: 1 1 40%; display: flex; overflow: hidden; }
  .col { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .col + .col { border-left: 1px solid var(--border); }
  .col-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 10px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--muted); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
  .card.low { border-left-color: var(--low); } .card.medium { border-left-color: var(--medium); } .card.high { border-left-color: var(--high); }
  .card-title { font-size: 12.5px; font-weight: 600; margin-bottom: 4px; }
  .card-body { font-size: 11.5px; color: #94a3b8; line-height: 1.5; white-space: pre-wrap; }
  .ev-item { font-size: 10.5px; color: var(--accent); background: rgba(99,102,241,.1); border-radius: 4px; padding: 3px 7px; margin-top: 4px; }
  .card-meta { font-size: 9.5px; color: var(--muted); margin-top: 6px; }

  .section { margin-bottom: 14px; }
  .section h3 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 6px; }
  .pill { display: inline-block; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2px 9px; font-size: 10.5px; margin: 2px; }
  .pill.online { border-color: var(--low); }
  .screen-desc { font-size: 10.5px; color: #94a3b8; font-style: italic; background: var(--surface); border-radius: 5px; padding: 6px 9px; }
  .fact { font-size: 10.5px; color: #94a3b8; padding: 3px 0; border-bottom: 1px solid var(--border); }
  .empty { color: var(--muted); font-size: 12px; font-style: italic; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<header>
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5">
    <path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l3 3"/><circle cx="19" cy="5" r="3" fill="#6366f1" stroke="none"/>
  </svg>
  <h1>Meeting Copilot</h1>
  <div class="status"><div class="dot" id="dot"></div><span id="status-text">connecting…</span></div>
</header>

<!-- TOP: conversation -->
<div class="conversation">
  <div class="panel-label">Conversation — what I heard · what I'm asking · your reply</div>
  <div id="thread"><p class="empty">Listening to the meeting…</p></div>
  <form class="composer" id="composer" autocomplete="off">
    <input id="reply" placeholder="Type your answer to the agent…" />
    <button type="submit">Send</button>
  </form>
</div>

<!-- BOTTOM: detail -->
<div class="detail">
  <div class="col">
    <div class="col-title">Insights</div>
    <div id="decisions"><p class="empty">No insights yet.</p></div>
  </div>
  <div class="col">
    <div class="col-title">Meeting State</div>
    <div class="section"><h3>Participants</h3><div id="participants"><span class="empty">Waiting…</span></div></div>
    <div class="section"><h3>Screen</h3><div id="screen" class="screen-desc">No screen captured.</div></div>
    <div class="section"><h3>Facts</h3><div id="facts"><span class="empty">None yet.</span></div></div>
  </div>
</div>

<script>
const dot = document.getElementById('dot'), statusText = document.getElementById('status-text');
const thread = document.getElementById('thread'), decisionsEl = document.getElementById('decisions');
const participantsEl = document.getElementById('participants'), screenEl = document.getElementById('screen'), factsEl = document.getElementById('facts');
let ws, firstTurn = true, firstDecision = true, lastAgentText = '';

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => { dot.classList.add('on'); statusText.textContent = 'live'; };
  ws.onclose = () => { dot.classList.remove('on'); statusText.textContent = 'reconnecting…'; setTimeout(connect, 2000); };
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if (m.type === 'heard')        addTurn('heard', '👂', 'Heard' + (m.speaker ? ` · ${m.speaker}` : ''), m.text);
    else if (m.type === 'agent_reply') addTurn('agent', '🤖', 'Agent', m.text, m.text.trim().endsWith('?') ? 'needs' : '');
    else if (m.type === 'you')      { addTurn('you', '🧑', 'You', m.text); setWaiting(false); }
    else if (m.type === 'decision') { renderDecision(m.data); maybeAgentTurn(m.data); }
    else if (m.type === 'state')    renderState(m.data);
  };
}

// `flag` = 'high' (urgent FYI) | 'needs' (wants your reply) | ''
function addTurn(cls, who, role, text, flag) {
  if (firstTurn) { thread.innerHTML = ''; firstTurn = false; }
  if (cls === 'agent') lastAgentText = text;
  const needs = flag === 'needs';
  const el = document.createElement('div');
  el.className = `turn ${cls}` + (flag === 'high' ? ' high' : '') + (needs ? ' needs-input' : '');
  const badge = needs ? '<span class="needs-badge">needs you</span>' : '';
  el.innerHTML = `<div class="who">${who}</div><div><div class="role">${role}${badge}</div><div class="bubble">${escapeHtml(text)}</div></div>`;
  thread.appendChild(el);
  thread.scrollTop = thread.scrollHeight;
  if (needs) setWaiting(true);
}

function setWaiting(on) {
  const composer = document.getElementById('composer');
  const input = document.getElementById('reply');
  composer.classList.toggle('waiting', on);
  dot.classList.toggle('attention', on);
  document.querySelector('.status').classList.toggle('attention', on);
  statusText.textContent = on ? 'needs you' : 'live';
  document.title = on ? '✋ Meeting Copilot — needs you' : 'Meeting Copilot';
  if (on) input.focus();
}

// Promote agent reactions (questions / high-urgency / executor) into the conversation
function maybeAgentTurn(d) {
  const t = (d.payload.title || '').toLowerCase();
  const body = d.payload.body || '';
  // Executor finished: embed the dashboard inline — no new tab.
  const urlMatch = body.match(/\/static\/outputs\/[^\s]+\.html/);
  if (t.startsWith('✅') && urlMatch) {
    addDashboardTurn(d.payload.title, body.replace(/📊[^\n]*/,'').trim(), urlMatch[0]);
    return;
  }
  const isQuestion = t.startsWith('suggested question');
  const isConversational = isQuestion || t.startsWith('🔧') || d.urgency === 'high';
  if (isConversational) {
    const text = d.payload.title.replace(/^(suggested question)/i, 'Quick question').trim()
               + (body ? ` — ${body}` : '');
    const flag = isQuestion ? 'needs' : (d.urgency === 'high' ? 'high' : '');
    addTurn('agent', '🤖', 'Agent', text, flag);
  }
}

function addDashboardTurn(title, summary, url) {
  if (firstTurn) { thread.innerHTML = ''; firstTurn = false; }
  const el = document.createElement('div');
  el.className = 'turn agent';
  el.style.maxWidth = '100%';
  el.innerHTML = `<div class="who">🤖</div><div style="flex:1">
      <div class="role">Agent · result</div>
      <div class="bubble">${escapeHtml(title)}${summary ? `<br><span style="color:#94a3b8">${escapeHtml(summary)}</span>` : ''}
        <iframe src="${url}" style="width:100%;height:340px;border:1px solid var(--border);border-radius:8px;margin-top:8px;background:#fff"></iframe>
        <a href="${url}" target="_blank" style="font-size:10.5px;color:var(--accent)">open full ↗</a>
      </div></div>`;
  thread.appendChild(el);
  thread.scrollTop = thread.scrollHeight;
}

function renderDecision(d) {
  if (firstDecision) { decisionsEl.innerHTML = ''; firstDecision = false; }
  const u = d.urgency || 'low';
  const ev = (d.payload.evidence || []).map(e => `<div class="ev-item">📎 ${e.source}: "${e.ref}"</div>`).join('');
  const card = document.createElement('div');
  card.className = `card ${u}`;
  card.innerHTML = `<div class="card-title">${escapeHtml(d.payload.title)}</div><div class="card-body">${escapeHtml(d.payload.body)}</div>${ev ? `<div>${ev}</div>` : ''}<div class="card-meta">${u} · ${Math.round(d.confidence*100)}%</div>`;
  decisionsEl.prepend(card);
}

function renderState(s) {
  if (s.participants.length) participantsEl.innerHTML = s.participants.map(p => `<span class="pill ${p.present?'online':''}">${escapeHtml(p.name)}</span>`).join('');
  if (s.current_screen) screenEl.textContent = s.current_screen;
  if (s.facts_asserted.length) factsEl.innerHTML = s.facts_asserted.slice(-6).map(f => `<div class="fact"><strong>${escapeHtml(f.by)}:</strong> ${escapeHtml(f.claim)}</div>`).join('');
}

document.getElementById('composer').addEventListener('submit', (e) => {
  e.preventDefault();
  const input = document.getElementById('reply');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'user_reply', text, in_reply_to: lastAgentText }));
  input.value = '';
});

function escapeHtml(s) { return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
connect();
</script>
</body>
</html>
