<!DOCTYPE html>
<html>
<head><title>Meet Caption Simulator</title>
<style>
  body { font-family: sans-serif; background: #202124; color: #fff; padding: 20px; }
  button { margin: 6px; padding: 10px 18px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
  #log { margin-top: 20px; font-size: 12px; color: #9aa0a6; }
  /* Mimic Meet's caption DOM structure — caption_adapter.py targets these attributes */
  #captions { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 600px; }
  .caption-line { background: rgba(0,0,0,0.7); border-radius: 4px; padding: 8px 12px; margin: 4px 0; }
  [data-participant-id] { display: block; }
  [jsname="r4nke"] { font-weight: bold; color: #8ab4f8; font-size: 13px; }
  [jsname="YSxPC"] { font-size: 15px; }
</style>
</head>
<body>
<h2>Meet Caption Simulator</h2>
<p>Simulates Google Meet's caption DOM for testing <code>caption_adapter.py</code></p>

<button onclick="addLine('Speaker One', 'This is a caption adapter test line.')">Line 1</button>
<button onclick="addLine('Speaker Two', 'Testing speaker attribution on the second line.')">Line 2</button>
<button onclick="addLine('Speaker One', 'A third line to confirm dedup and ordering.')">Line 3</button>
<button onclick="addLine('Speaker Two', 'Final test line for the caption pipeline.')">Line 4</button>
<button onclick="clearCaptions()">Clear</button>

<div id="captions"></div>
<div id="log"></div>

<script>
let lineCount = 0;

function addLine(speaker, text) {
  const el = document.createElement('div');
  el.className = 'caption-line';
  el.setAttribute('data-participant-id', 'p-' + speaker.replace(' ','-').toLowerCase());
  el.innerHTML = `
    <span jsname="r4nke">${speaker}</span>
    <span jsname="YSxPC">${text}</span>
  `;
  document.getElementById('captions').appendChild(el);
  lineCount++;
  document.getElementById('log').textContent = `Lines in DOM: ${lineCount}`;

  // Auto-remove after 8s to simulate Meet's rolling captions
  setTimeout(() => el.remove(), 8000);
}

function clearCaptions() {
  document.getElementById('captions').innerHTML = '';
  lineCount = 0;
  document.getElementById('log').textContent = 'Cleared';
}
</script>
</body>
</html>
